# git-cliff configuration — https://git-cliff.org
#
# Generates CHANGELOG.md from Conventional Commit messages across the whole
# monorepo (backend + web + android). Run it via `go tool mage changelog`
# from ./backend, or directly: `git-cliff --config cliff.toml -o CHANGELOG.md`.
#
# To scope the changelog to one component instead, add `--include-path
# "backend/**"` on the command line — the parsers below stay the same.

[changelog]
# Rendered once, at the top of the file.
header = """
# Changelog

All notable changes to this project are documented here. This file is generated
from [Conventional Commit](https://www.conventionalcommits.org) messages by
[git-cliff](https://git-cliff.org) — edit the commits, not this file.\n
"""
# Rendered per release. `group` values carry an ordering prefix in an HTML
# comment (`<!-- 0 -->`) that `striptags` removes before display, so sections
# always appear in a fixed order regardless of commit order.
body = """
{% if version -%}
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else -%}
## [unreleased]
{% endif -%}
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim | upper_first }}
{% for commit in commits %}
- {% if commit.scope %}**{{ commit.scope }}:** {% endif %}{{ commit.message | upper_first }} ({{ commit.id | truncate(length=7, end="") }})
{%- endfor %}
{% endfor %}
"""
footer = ""
# Strip leading/trailing whitespace from the rendered template.
trim = true

[git]
# Parse messages as Conventional Commits (type(scope): description).
conventional_commits = true
# Keep commits that don't parse as conventional (routed to "Other" below)
# rather than dropping them silently.
filter_unconventional = false
# Don't split a commit body into multiple changelog entries.
split_commits = false
# Only tags matching this glob start a new released section; everything above
# the newest tag lands under "[unreleased]".
tag_pattern = "v[0-9]*"
# Newest commits first within each section.
sort_commits = "newest"

# First matching rule wins. Group labels carry an ordering prefix (see above).
commit_parsers = [
    { message = "^feat", group = "<!-- 0 -->Features" },
    { message = "^fix", group = "<!-- 1 -->Bug fixes" },
    { message = "^perf", group = "<!-- 2 -->Performance" },
    { message = "^refactor", group = "<!-- 3 -->Refactoring" },
    { message = "^docs", group = "<!-- 4 -->Documentation" },
    { message = "^test", group = "<!-- 5 -->Testing" },
    { message = "^build", group = "<!-- 6 -->Build system" },
    { message = "^ci", group = "<!-- 7 -->Continuous integration" },
    # Dependency bumps get their own section; other chores are grouped together.
    { message = "^chore\\(deps\\)", group = "<!-- 8 -->Dependencies" },
    { message = "^chore\\(release\\)", skip = true },
    { message = "^chore", group = "<!-- 9 -->Miscellaneous" },
    { message = "^revert", group = "<!-- 10 -->Reverts" },
    # Anything with security in the body, regardless of type.
    { body = ".*security", group = "<!-- 11 -->Security" },
    # Catch-all for unconventional messages.
    { message = ".*", group = "<!-- 12 -->Other" },
]

# Enables commit/PR autolinking and richer templating if you later reference it.
[remote.github]
owner = "DoppleDankster"
repo = "uncaved"
